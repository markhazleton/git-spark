apiVersion: devspark.ai/v1
kind: HarnessSpec
name: git-spark-specify-clarify-plan-tasks-analyze-critic-implement

scope:
  type: repo

defaults:
  adapter: claude_code
  mode: agent
  retry:
    maxAttempts: 2
    backoff: fixed
    retryOn:
      - validation_fail
      - tool_error
    requireHumanAfter: 2

telemetry:
  emit_jsonl: true
  run_dir: .documentation/devspark/runs

steps:
  - id: specify
    name: Create or update feature spec
    type: agent_task
    prompt_file: .github/prompts/devspark.specify.prompt.md
    outputs:
      - .documentation/specs/001-dependency-hygiene-hardening/spec.md
      - .documentation/specs/001-dependency-hygiene-hardening/checklists/requirements.md
    validation:
      - id: spec-file-exists
        type: file.exists
        severity: error
        path: .documentation/specs/001-dependency-hygiene-hardening/spec.md
      - id: spec-checklist-exists
        type: file.exists
        severity: error
        path: .documentation/specs/001-dependency-hygiene-hardening/checklists/requirements.md

  - id: clarify
    name: Resolve spec ambiguities
    type: agent_task
    prompt_file: .github/prompts/devspark.clarify.prompt.md
    inputs:
      - .documentation/specs/001-dependency-hygiene-hardening/spec.md
    outputs:
      - .documentation/specs/001-dependency-hygiene-hardening/spec.md
    validation:
      - id: clarified-spec-exists
        type: file.exists
        severity: error
        path: .documentation/specs/001-dependency-hygiene-hardening/spec.md

  - id: plan
    name: Build implementation plan
    type: agent_task
    adapter: manual
    prompt_file: .github/prompts/devspark.plan.prompt.md
    inputs:
      - .documentation/specs/001-dependency-hygiene-hardening/spec.md
    outputs:
      - .documentation/specs/001-dependency-hygiene-hardening/plan.md
    validation:
      - id: plan-generated
        type: file.exists
        severity: error
        path: .documentation/specs/001-dependency-hygiene-hardening/plan.md

  - id: tasks
    name: Generate executable task list
    type: agent_task
    adapter: manual
    prompt_file: .github/prompts/devspark.tasks.prompt.md
    inputs:
      - .documentation/specs/001-dependency-hygiene-hardening/plan.md
    outputs:
      - .documentation/specs/001-dependency-hygiene-hardening/tasks.md
    validation:
      - id: tasks-generated
        type: file.exists
        severity: error
        path: .documentation/specs/001-dependency-hygiene-hardening/tasks.md

  - id: analyze
    name: Consistency and quality analysis
    type: agent_task
    prompt_file: .github/prompts/devspark.analyze.prompt.md
    inputs:
      - .documentation/specs/001-dependency-hygiene-hardening/spec.md
      - .documentation/specs/001-dependency-hygiene-hardening/plan.md
      - .documentation/specs/001-dependency-hygiene-hardening/tasks.md
    validation:
      - id: analyze-inputs-present
        type: file.exists
        severity: error
        path: .documentation/specs/001-dependency-hygiene-hardening/tasks.md

  - id: critic
    name: Adversarial risk analysis
    type: agent_task
    prompt_file: .github/prompts/devspark.critic.prompt.md
    inputs:
      - .documentation/specs/001-dependency-hygiene-hardening/spec.md
      - .documentation/specs/001-dependency-hygiene-hardening/plan.md
      - .documentation/specs/001-dependency-hygiene-hardening/tasks.md
    validation:
      - id: critic-run-completed
        type: command.exit_code
        severity: error
        command: devspark harness trace latest
        expected_exit: 0

  - id: implement
    name: Execute tasks and implement changes
    type: agent_task
    adapter: manual
    prompt_file: .github/prompts/devspark.implement.prompt.md
    inputs:
      - .documentation/specs/001-dependency-hygiene-hardening/tasks.md
    validation:
      - id: tests-pass
        type: command.exit_code
        severity: error
        command: npm test
        expected_exit: 0
      - id: build-pass
        type: command.exit_code
        severity: error
        command: npm run build
        expected_exit: 0
